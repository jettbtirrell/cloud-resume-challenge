name: Deploy Resume Site

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::945219712931:role/github-actions-resume-deploy
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync frontend/ s3://jett-cloud-resume-2026 --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id EH2FPOYLSG1J4 --paths "/*"